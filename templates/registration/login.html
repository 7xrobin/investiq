{% extends "base.html" %}

{% block title %}Sign in — Investiq{% endblock %}

{% block content %}
<div class="flex-1 flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-brand-100 mb-4">
        <svg class="w-6 h-6 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-gray-900">Welcome back</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to your Investiq account</p>
    </div>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      {% if form.errors %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">
        Invalid username or password.
      </div>
      {% endif %}

      <div>
        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">
          Username
        </label>
        <input type="text" name="username" id="id_username" autocomplete="username" required
               autofocus
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                      placeholder-gray-400"
               placeholder="your username">
      </div>

      <div>
        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input type="password" name="password" id="id_password" autocomplete="current-password" required
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                      placeholder-gray-400"
               placeholder="••••••••">
      </div>

      <input type="hidden" name="next" value="{{ next }}">

      <button type="submit"
              class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium
                     rounded-lg px-4 py-2.5 text-sm transition-colors">
        Sign in
      </button>
    </form>

  </div>
</div>
{% endblock %}
